<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentOS</title>
  </head>
  <body>
    <div id="root"><div style="padding:40px;font-family:system-ui;color:#F59E0B;">Loading AgentOS...</div></div>
    <script>
      // Global error capture before React loads
      window.__errors = [];
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('root');
        var msgStr = (err && err.stack) ? err.stack : String(msg) + ' at ' + src + ':' + line;
        window.__errors.push(msgStr);
        if (el) el.innerHTML = '<div style="padding:20px;font-family:monospace;font-size:12px;color:red;white-space:pre-wrap;">ERROR: ' + msgStr.replace(/</g,'&lt;') + '</div>';
      };
      window.onunhandledrejection = function(evt) {
        var el = document.getElementById('root');
        var msgStr = String(evt.reason);
        window.__errors.push(msgStr);
        if (el) el.innerHTML = '<div style="padding:20px;font-family:monospace;font-size:12px;color:red;white-space:pre-wrap;">PROMISE ERROR: ' + msgStr.replace(/</g,'&lt;') + '</div>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
